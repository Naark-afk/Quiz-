<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Quiz: Czy nadajesz się do mat-fiz-inf?</title>

    <!-- Biblioteka QR -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #f0f4f8;
            padding: 20px;
        }

        .quiz-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            max-width: 600px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .qr-container {
            background: #ffffff;
            margin: 20px auto;
            padding: 15px;
            border-radius: 10px;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        #qrcode {
            margin-top: 10px;
        }

        h1, h2 {
            text-align: center;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>Czy nadajesz się do klasy mat-fiz-inf?</h1>

    <form id="quizForm">
        <p>1. Lubisz matematykę?</p>
        <label><input type="radio" name="q1" value="2"> Tak</label><br>
        <label><input type="radio" name="q1" value="1"> Trochę</label><br>
        <label><input type="radio" name="q1" value="0"> Nie</label><br>

        <p>2. Czy interesuje Cię fizyka?</p>
        <label><input type="radio" name="q2" value="2"> Tak</label><br>
        <label><input type="radio" name="q2" value="1"> Trochę</label><br>
        <label><input type="radio" name="q2" value="0"> Nie</label><br>

        <p>3. Lubisz komputery?</p>
        <label><input type="radio" name="q3" value="2"> Tak</label><br>
        <label><input type="radio" name="q3" value="1"> Trochę</label><br>
        <label><input type="radio" name="q3" value="0"> Nie</label><br>

        <p>4. Myślisz logicznie?</p>
        <label><input type="radio" name="q4" value="2"> Tak</label><br>
        <label><input type="radio" name="q4" value="1"> Średnio</label><br>
        <label><input type="radio" name="q4" value="0"> Nie</label><br>

        <p>5. Jesteś cierpliwy?</p>
        <label><input type="radio" name="q5" value="2"> Tak</label><br>
        <label><input type="radio" name="q5" value="1"> Czasami</label><br>
        <label><input type="radio" name="q5" value="0"> Nie</label><br>

        <button type="button" onclick="calculateScore()">Sprawdź wynik</button>
    </form>

    <div id="result"></div>
</div>

<!-- OSOBNE OKIENKO NA QR -->
<div class="qr-container">
    <h2>Kod QR</h2>
    <div id="qrcode"></div>
</div>

<script>
function calculateScore() {
    let score = 0;
    const form = document.forms["quizForm"];

    for (let i = 1; i <= 5; i++) {
        if (!form["q" + i].value) {
            alert("Odpowiedz na wszystkie pytania!");
            return;
        }
        score += parseInt(form["q" + i].value);
    }

    let text = "";
    if (score >= 8) text = "Idealny kandydat 🚀";
    else if (score >= 5) text = "Masz potencjał 👍";
    else text = "Może inna klasa 🤔";

    document.getElementById("result").innerText =
        "Wynik: " + score + "/10 - " + text;
}

// Generowanie QR
new QRCode(document.getElementById("qrcode"), {
    text: window.location.href,
    width: 150,
    height: 150
    
});







</script>






</body>
</html>
